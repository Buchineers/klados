<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <linearGradient id="sciGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur" />
      <feFlood flood-color="#00c6ff" flood-opacity="0.4" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <text x="50%" y="53%" 
        font-family="'Computer Modern', 'Times New Roman', Cambria, serif" 
        font-size="110" 
        font-style="italic" 
        font-weight="normal" 
        fill="url(#sciGradient)" 
        text-anchor="middle" 
        dominant-baseline="middle"
        filter="url(#glow)"
        letter-spacing="2">
    κλάδος
  </text>
</svg>
